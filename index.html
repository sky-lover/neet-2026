<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEET 2026</title>

<!-- ICONS -->
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05060a">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#05060a;
  --text:#eaeaf0;
  --accent:#6ea0ff;
  --calm:#4ade80;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 50% 40%, #0b1220, #000 70%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.wrapper{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.title{
  font-weight:800;
  letter-spacing:2px;
  font-size:clamp(1.4rem,4vw,1.8rem);
}

.datetime{
  font-size:0.8rem;
  opacity:0.6;
}

.ring{
  width:min(75vw, 300px);
  aspect-ratio:1;
  position:relative;
}

svg{
  width:100%;
  height:100%;
  transform:rotate(-90deg);
}

.track{
  fill:none;
  stroke:rgba(255,255,255,0.08);
  stroke-width:4;
}

.progress{
  fill:none;
  stroke:var(--accent);
  stroke-width:4;
  stroke-linecap:round;
  filter: drop-shadow(0 0 6px rgba(110,160,255,0.6));
  transition: stroke-dashoffset 0.5s ease, filter 0.3s ease;
}

.dot{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent), 0 0 20px rgba(110,160,255,0.5);
  transform:translate(-50%,-50%);
}

.center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-family:'JetBrains Mono',monospace;
}

.time-line{
  font-size:clamp(1.4rem,5vw,2rem);
  letter-spacing:2px;
}

.row{
  display:flex;
  gap:10px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:8px 14px;
  border-radius:12px;
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.15s ease;
}

.box:active{
  transform:scale(0.9);
}

.box.done{
  opacity:0.3;
}

.next{
  font-size:0.85rem;
  opacity:0.8;
  text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="title">NEET 2026</div>
  <div class="datetime" id="dateTime"></div>

  <div class="ring">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="45"></circle>
      <circle class="progress" id="progressCircle" cx="50" cy="50" r="45"></circle>
    </svg>

    <div class="dot" id="dot"></div>

    <div class="center">
      <div class="time-line" id="timeLine">00:00:00:00</div>
    </div>
  </div>

  <div class="row">
    <div class="box" id="b12Btn">B12</div>
    <div class="box" id="d3Btn">D3</div>
  </div>

  <div class="next" id="nextEvent"></div>

</div>

<script>
const examStart=new Date("2026-05-03T14:00:00+05:30");
const startWindow=new Date("2026-04-03T00:00:00+05:30");

const tests=[
{d:"2026-04-05",type:"AIATS"},{d:"2026-04-07",type:"FTS"},{d:"2026-04-09",type:"FTS"},{d:"2026-04-12",type:"AIATS"},{d:"2026-04-14",type:"FTS"},{d:"2026-04-16",type:"FTS"},{d:"2026-04-19",type:"AIATS"},{d:"2026-04-21",type:"MOCK"},{d:"2026-04-23",type:"MOCK"},{d:"2026-04-26",type:"AIATS"},{d:"2026-04-27",type:"AIATS"},{d:"2026-04-28",type:"MOCK"},{d:"2026-05-01",type:"MOCK"}
].map(t=>({...t,date:new Date(t.d+"T00:00:00+05:30")}));

const d3Days=[6,13,20,27];

const circle=document.getElementById("progressCircle");
const dot=document.getElementById("dot");

const radius=45;
const circumference=2*Math.PI*radius;
circle.style.strokeDasharray=circumference;

function formatDate(date){
return date.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function applyTaskState(){
const saved=JSON.parse(localStorage.getItem("tasks")||"{}");
const key=new Date().toDateString();

b12Btn.classList.toggle('done', saved[key]?.b12);
d3Btn.classList.toggle('done', saved[key]?.d3);
}

function update(){
const now=new Date();

// datetime
 dateTime.innerText=now.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});

const diff=examStart-now;

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000%24);
const m=Math.floor(diff/60000%60);
const s=Math.floor(diff/1000%60);

const format=(x)=>String(x).padStart(2,'0');
timeLine.innerText=`${format(d)}:${format(h)}:${format(m)}:${format(s)}`;

// next event
const upcoming=tests.filter(t=>t.date>=new Date(now.toDateString()));
const next=upcoming[0];
nextEvent.innerText=next?`${formatDate(next.date)} • ${next.type}`:"Final stretch";

// progress
const total=examStart-startWindow;
const elapsed=now-startWindow;
let p=Math.max(0,Math.min(1,elapsed/total));

circle.style.strokeDashoffset=circumference*(1-p);

const color=d<=7?'#4ade80':'#6ea0ff';
circle.style.stroke=color;

// dot position (responsive)
const angle=2*Math.PI*p - Math.PI/2;
const x=50 + radius*Math.cos(angle);
const y=50 + radius*Math.sin(angle);

// convert svg coords to %
dot.style.left = x + "%";
dot.style.top = y + "%";
dot.style.background=color;

// buttons
const today=now.getDate();
b12Btn.style.display="block";
d3Btn.style.display=d3Days.includes(today)?"block":"none";
}

function toggleTask(task){
const key=new Date().toDateString();
let saved=JSON.parse(localStorage.getItem("tasks")||"{}");
if(!saved[key]) saved[key]={};
saved[key][task]=!saved[key][task];
localStorage.setItem("tasks",JSON.stringify(saved));
applyTaskState();
}

b12Btn.onclick=()=>toggleTask('b12');
d3Btn.onclick=()=>toggleTask('d3');

applyTaskState();
setInterval(update,1000);
update();
</script>

</body>
</html>

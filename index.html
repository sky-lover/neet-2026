<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEET 2026</title>

<!-- ✅ FAVICON (browser tab) -->
<link rel="icon" href="favicon.png?v=3" type="image/png">

<!-- ✅ iOS Home Screen Icon -->
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NEET 2026">

<!-- ✅ Android / PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05060a">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#05060a;
  --text:#eaeaf0;
  --accent:#6ea0ff;
  --calm:#4ade80;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 50% 40%, #0b1220, #000 70%);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.title{
  font-weight:800;
  letter-spacing:2px;
  font-size:1.7rem;
  opacity:0.95;
}

.datetime{
  font-size:0.78rem;
  opacity:0.55;
}

.ring{
  width:320px;
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

svg{
  position:absolute;
  width:320px;
  height:320px;
  transform:rotate(-90deg);
}

.track{
  fill:none;
  stroke:rgba(255,255,255,0.08);
  stroke-width:10;
}

.progress{
  fill:none;
  stroke:var(--accent);
  stroke-width:10;
  stroke-linecap:round;
  filter: drop-shadow(0 0 6px rgba(110,160,255,0.35));
  transition: stroke 0.4s ease, stroke-dashoffset 0.6s cubic-bezier(.22,1,.36,1);
  will-change: stroke-dashoffset;
}

.dot{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent),0 0 20px rgba(110,160,255,0.5);
  transform:translate(-50%,-50%);
}

.center{
  text-align:center;
  z-index:2;
  font-family:'JetBrains Mono',monospace;
}

.time-line{
  font-size:2.2rem;
  letter-spacing:2px;
  opacity:0.95;
}

.row{
  display:flex;
  gap:12px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:10px 16px;
  border-radius:14px;
  font-size:0.85rem;
  cursor:pointer;
  transition:all 0.18s ease;
  backdrop-filter:blur(8px);
}

.box:hover{
  background:rgba(255,255,255,0.08);
}

.box:active{
  transform:scale(0.9);
  background:rgba(255,255,255,0.18);
}

.box.done{
  opacity:0.3;
  text-decoration:line-through;
}

.next{
  font-size:0.95rem;
  opacity:0.85;
}

@media(max-width:500px){
  .ring{width:260px;height:260px}
  svg{width:260px;height:260px}
  .time-line{font-size:1.6rem}
}

</style>
</head>
<body>

<div class="wrapper">

  <div class="title">NEET 2026</div>
  <div class="datetime" id="dateTime"></div>

  <div class="ring">
    <svg>
      <circle class="track" cx="160" cy="160" r="140"></circle>
      <circle class="progress" id="progressCircle" cx="160" cy="160" r="140"></circle>
    </svg>

    <div class="dot" id="dot"></div>

    <div class="center">
      <div class="time-line" id="timeLine">00:00:00:00</div>
    </div>
  </div>

  <div class="row">
    <div class="box" id="b12Btn">B12</div>
    <div class="box" id="d3Btn">D3</div>
  </div>

  <div class="next" id="nextEvent"></div>

</div>

<script>
const examStart=new Date("2026-05-03T14:00:00+05:30");
const startWindow=new Date("2026-04-03T00:00:00+05:30");

const tests=[
{d:"2026-04-05",type:"AIATS"},{d:"2026-04-07",type:"FTS"},{d:"2026-04-09",type:"FTS"},{d:"2026-04-12",type:"AIATS"},{d:"2026-04-14",type:"FTS"},{d:"2026-04-16",type:"FTS"},{d:"2026-04-19",type:"AIATS"},{d:"2026-04-21",type:"MOCK"},{d:"2026-04-23",type:"MOCK"},{d:"2026-04-26",type:"AIATS"},{d:"2026-04-27",type:"AIATS"},{d:"2026-04-28",type:"MOCK"},{d:"2026-05-01",type:"MOCK"}
].map(t=>({...t,date:new Date(t.d+"T00:00:00+05:30")}));

const d3Days=[6,13,20,27];

const circle=document.getElementById("progressCircle");
const dot=document.getElementById("dot");
const radius=140;
const circumference=2*Math.PI*radius;

circle.style.strokeDasharray=circumference;

function formatDate(date){
return date.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function applyTaskState(){
const saved=JSON.parse(localStorage.getItem("tasks")||"{}");
const key=new Date().toDateString();

b12Btn.classList.toggle('done', saved[key]?.b12);
d3Btn.classList.toggle('done', saved[key]?.d3);
}

function update(){
const now=new Date();

// date time
dateTime.innerText=now.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});

const diff=examStart-now;

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000%24);
const m=Math.floor(diff/60000%60);
const s=Math.floor(diff/1000%60);

const format=(x)=>String(x).padStart(2,'0');
timeLine.innerText=`${format(d)}:${format(h)}:${format(m)}:${format(s)}`;

// next event
const upcoming=tests.filter(t=>t.date>=new Date(now.toDateString()));
const next=upcoming[0];
nextEvent.innerText=next?`${formatDate(next.date)} • ${next.type}`:"Final stretch";

// progress
const total=examStart-startWindow;
const elapsed=now-startWindow;
let p=Math.max(0,Math.min(1,elapsed/total));

const offset=circumference*(1-p);
circle.style.strokeDashoffset=offset;

const color=d<=7?'#4ade80':'#6ea0ff';
circle.style.stroke=color;

// moving dot
const angle=2*Math.PI*p - Math.PI/2;
const cx=160 + radius*Math.cos(angle);
const cy=160 + radius*Math.sin(angle);

dot.style.left=cx+"px";
dot.style.top=cy+"px";
dot.style.background=color;
dot.style.boxShadow=`0 0 10px ${color},0 0 20px ${color}`;

// buttons
const today=now.getDate();
b12Btn.style.display="block";
d3Btn.style.display=d3Days.includes(today)?"block":"none";
}

function toggleTask(task){
const key=new Date().toDateString();
let saved=JSON.parse(localStorage.getItem("tasks")||"{}");
if(!saved[key]) saved[key]={};
saved[key][task]=!saved[key][task];
localStorage.setItem("tasks",JSON.stringify(saved));
applyTaskState();
}

b12Btn.onclick=()=>toggleTask('b12');
d3Btn.onclick=()=>toggleTask('d3');

applyTaskState();
setInterval(update,1000);
update();
</script>

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
